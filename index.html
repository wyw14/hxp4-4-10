<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHANNEL ZERO - CRT Tuner</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <div class="tv-frame">
      <div class="tv-screen-container">
        <canvas id="glCanvas"></canvas>
        <div class="screen-glare"></div>
        <div class="scanlines"></div>
        <div id="signalOverlay" class="signal-overlay">
          <div class="signal-name"></div>
          <div class="signal-description"></div>
          <div class="binary-stream"></div>
        </div>
      </div>
      
      <div class="tv-body">
        <div class="brand-label">CHANNEL ZERO</div>
        
        <div class="controls-panel">
          <div class="knob-group">
            <div class="knob-label">VHF</div>
            <div class="knob" id="vhfKnob" data-param="vhf">
              <div class="knob-mark"></div>
            </div>
            <div class="knob-value" id="vhfValue">000</div>
          </div>
          
          <div class="knob-group">
            <div class="knob-label">UHF</div>
            <div class="knob" id="uhfKnob" data-param="uhf">
              <div class="knob-mark"></div>
            </div>
            <div class="knob-value" id="uhfValue">000</div>
          </div>
          
          <div class="knob-group">
            <div class="knob-label">ANTENNA</div>
            <div class="knob" id="antennaKnob" data-param="antenna">
              <div class="knob-mark"></div>
            </div>
            <div class="knob-value" id="antennaValue">000°</div>
          </div>
        </div>
        
        <div class="status-bar">
          <div class="signal-meter">
            <div class="signal-meter-label">SIGNAL</div>
            <div class="signal-meter-bar">
              <div class="signal-meter-fill" id="signalFill"></div>
            </div>
          </div>
          <div class="weather-indicator">
            <span class="weather-icon">⛈</span>
            <span class="weather-label">STORM</span>
          </div>
          <button class="mixer-toggle" id="mixerToggle">
            <span class="mixer-icon">🎚</span>
            <span class="mixer-label">MIXER</span>
          </button>
        </div>

        <div class="mixer-panel" id="mixerPanel" role="region" aria-label="音频混音面板" aria-hidden="true">
          <div class="mixer-header">
            <span class="mixer-title">AUDIO MIXER</span>
            <button class="mixer-power" id="audioPower" aria-label="音频电源开关" aria-pressed="false">
              <span class="power-icon">◉</span>
            </button>
          </div>
          
          <div class="mixer-controls">
            <div class="mixer-channel">
              <div class="channel-label" id="noiseLabel">WHITE NOISE</div>
              <div class="channel-slider-container">
                <input type="range" class="channel-slider" id="noiseVolume" min="0" max="100" value="50"
                       aria-labelledby="noiseLabel" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50" aria-valuetext="50%" />
                <div class="channel-value" id="noiseValue" aria-live="polite">50%</div>
              </div>
            </div>

            <div class="mixer-channel">
              <div class="channel-label" id="signalLabel">SIGNAL TONE</div>
              <div class="channel-slider-container">
                <input type="range" class="channel-slider" id="signalVolume" min="0" max="100" value="50"
                       aria-labelledby="signalLabel" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50" aria-valuetext="50%" />
                <div class="channel-value" id="signalValue" aria-live="polite">50%</div>
              </div>
            </div>

            <div class="mixer-channel">
              <div class="channel-label" id="driftLabel">FREQ DRIFT</div>
              <div class="channel-slider-container">
                <input type="range" class="channel-slider" id="freqDrift" min="0" max="100" value="30"
                       aria-labelledby="driftLabel" aria-valuemin="0" aria-valuemax="100" aria-valuenow="30" aria-valuetext="30%" />
                <div class="channel-value" id="freqValue" aria-live="polite">30%</div>
              </div>
            </div>

            <div class="mixer-channel master">
              <div class="channel-label" id="masterLabel">MASTER</div>
              <div class="channel-slider-container">
                <input type="range" class="channel-slider" id="masterVolume" min="0" max="100" value="70"
                       aria-labelledby="masterLabel" aria-valuemin="0" aria-valuemax="100" aria-valuenow="70" aria-valuetext="70%" />
                <div class="channel-value" id="masterValue" aria-live="polite">70%</div>
              </div>
            </div>
          </div>
        </div>
        
        <div class="instructions">
          <div>Drag knobs to tune • Scroll to fine-tune</div>
          <div id="foundCount">Signals found: 0 / 4</div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
